<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Online Voting System</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial;
    background: linear-gradient(to right, #4e73df, #1cc88a);
    text-align: center;
    padding: 40px;
}

h1 {
    color: white;
    margin-bottom: 20px;
}

.candidate {
    background: white;
    width: 320px;
    margin: 15px auto;
    padding: 20px;
    border-radius: 10px;
}

button {
    padding: 8px 15px;
    margin: 5px;
    border: none;
    background: #4e73df;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #2e59d9;
}

.bar {
    height: 10px;
    background: green;
    margin-top: 5px;
    width: 0%;
}

#message {
    margin-top: 20px;
    color: yellow;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>Online Voting System</h1>

<div class="candidate">
    <p>Candidate A</p>
    <button onclick="vote(0)">Vote</button>
    <p id="count0">Votes: 0</p>
    <div class="bar" id="bar0"></div>
</div>

<div class="candidate">
    <p>Candidate B</p>
    <button onclick="vote(1)">Vote</button>
    <p id="count1">Votes: 0</p>
    <div class="bar" id="bar1"></div>
</div>

<div class="candidate">
    <p>Candidate C</p>
    <button onclick="vote(2)">Vote</button>
    <p id="count2">Votes: 0</p>
    <div class="bar" id="bar2"></div>
</div>

<br>

<button onclick="showWinner()">Show Winner</button>
<button onclick="resetVotes()">Reset</button>

<p id="message"></p>

<script>

let votes = JSON.parse(localStorage.getItem("votes")) || [0,0,0];
let hasVoted = false;

// Load previous votes
updateUI();

function vote(index) {

    if (hasVoted) {
        document.getElementById("message").innerText = "You already voted!";
        return;
    }

    votes[index]++;
    hasVoted = true;

    localStorage.setItem("votes", JSON.stringify(votes));

    updateUI();

    document.getElementById("message").innerText = "Thank you for voting!";
}

function updateUI() {

    let total = votes.reduce((a,b) => a+b, 0);

    for (let i=0; i<votes.length; i++) {
        document.getElementById("count"+i).innerText = "Votes: " + votes[i];

        let percent = total ? (votes[i]/total)*100 : 0;
        document.getElementById("bar"+i).style.width = percent + "%";
    }
}

function showWinner() {
    let max = Math.max(...votes);
    let index = votes.indexOf(max);
    let names = ["Candidate A","Candidate B","Candidate C"];

    document.getElementById("message").innerText =
        "🏆 Winner: " + names[index];
}

function resetVotes() {
    votes = [0,0,0];
    hasVoted = false;
    localStorage.removeItem("votes");

    updateUI();

    document.getElementById("message").innerText = "Voting reset!";
}

</script>

</body>
</html>
